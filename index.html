<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- 1. 社交分享元标签 (用于生成转发卡片) -->
    <title>我想和你建立小三关系</title>
    <meta property="og:title" content="我想和你建立小三关系">
    <meta property="og:description" content="成为我的小三，让QQ记录我们的每日地下情">
    <!-- 重点：这里指向你仓库里的图片地址 -->
    <meta property="og:image" content="https://daisycelandine.github.io/DaisyCelandine.github-io/preview.jpg">
    <meta property="og:url" content="https://daisycelandine.github.io/DaisyCelandine.github-io/">
    <meta property="og:type" content="website">

    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #f2f2f2;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* 模拟 QQ 转发卡片样式 */
        .card-container {
            width: 90%;
            max-width: 320px;
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            cursor: pointer;
            transition: transform 0.1s;
            text-decoration: none;
            display: block;
            position: relative;
        }

        .card-container:active {
            transform: scale(0.98);
            background-color: #f9f9f9;
        }

        .card-main {
            padding: 16px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 12px;
        }

        .text-content {
            flex: 1;
        }

        .title {
            font-size: 17px;
            color: #000000;
            font-weight: 500;
            margin-bottom: 8px;
            line-height: 1.4;
        }

        .description {
            font-size: 13px;
            color: #888888;
            line-height: 1.5;
        }

        .thumb {
            width: 65px;
            height: 65px;
            border-radius: 6px;
            object-fit: cover;
            flex-shrink: 0;
        }

        .card-footer {
            margin: 0 16px;
            padding: 10px 0;
            border-top: 1px solid #f0f0f0;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .qq-icon {
            width: 14px;
            height: 14px;
        }

        .footer-text {
            font-size: 11px;
            color: #999;
        }

        .hint {
            margin-top: 20px;
            font-size: 12px;
            color: #bbb;
        }
    </style>
</head>
<body>

    <!-- 微信抓取补丁：在页面最顶部放一张隐藏的大图，增加抓取成功率 -->
    <img src="preview.png" style="position: absolute; top: -9999px; width: 300px;">

    <a href="https://www.stardewvalley.net/" class="card-container">
        <div class="card-main">
            <div class="text-content">
                <div class="title">我想和你建立小三关系</div>
                <div class="description">成为我的小三，让QQ记录我们的每日地下情</div>
            </div>
            <!-- 使用仓库内的图片 -->
            <img src="preview.jpg" class="thumb">
        </div>
        <div class="card-footer">
            <!-- QQ小图标 -->
            <img src="https://pub.idqqimg.com/pc/misc/files/20170928/58d7938360d249d68f635c234a946808.png" class="qq-icon">
            <span class="footer-text">QQ</span>
        </div>
    </a>

    <div class="hint">点击上方卡片进入游戏</div>

</body>
</html>
