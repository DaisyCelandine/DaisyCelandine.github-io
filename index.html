<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- 浏览器标签页标题 -->
    <title>我想和你建立小三关系</title>

    <!-- Open Graph 标准元标签（QQ、部分浏览器预览） -->
    <meta property="og:title" content="我想和你建立小三关系">
    <meta property="og:description" content="成为我的小三，让QQ记录我们的每日地下情">
    <!-- 预览图：必须是绝对路径 -->
    <meta property="og:image" content="https://trae-api-cn.mchost.guru/api/ide/v1/text_to_image?prompt=A%20pink%20lollipop%20in%20the%20shape%20of%20a%20heart%20on%20a%20pink%20background%20with%20rounded%20corners%2C%20no%20black%20border%2C%20clean%20and%20cute%2C%203D%20rendering%2C%20high%20quality&image_size=square">
    <!-- 你的 GitHub Pages 真实地址 -->
    <meta property="og:url" content="https://daisycelandine.github.io/DaisyCelandine.github-io/">
    <meta property="og:type" content="website">

    <!-- 微信抓取补丁 -->
    <meta name="description" content="成为我的小三，让QQ记录我们的每日地下情">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            color: white;
        }
        .loading-box { text-align: center; }
        /* 隐藏微信抓取图 */
        .wx-share-img { position: absolute; top: -9999px; left: -9999px; width: 300px; height: 300px; }
    </style>
</head>
<body>
    <!-- 微信和QQ有时会抓取正文第一张大于300px的图片作为缩略图 -->
    <img src="https://trae-api-cn.mchost.guru/api/ide/v1/text_to_image?prompt=A%20pink%20lollipop%20in%20the%20shape%20of%20a%20heart%20on%20a%20pink%20background%20with%20rounded%20corners%2C%20no%20black%20border%2C%20clean%20and%20cute%2C%203D%20rendering%2C%20high%20quality&image_size=square" class="wx-share-img">

    <div class="loading-box">
        <h2>正在连接中...</h2>
        <p>正在进入星露谷物语...</p>
    </div>

    <script>
        // 为了确保社交软件的爬虫能读取到上面的 Meta 标签，建议延迟 1 秒再跳转
        setTimeout(function() {
            window.location.href = 'https://www.stardewvalley.net/';
        }, 1200);
    </script>
</body>
</html>
